<nav class="flex items-center justify-between px-6 py-4">
  <a routerLink="/home" class="font-mono text-xl font-bold tracking-tight text-neutral-900 dark:text-neutral-100">SD</a>
  <div class="flex items-center gap-6">
    @for (link of [
      { path: '/home', label: 'home' },
      { path: '/projects', label: 'projects' },
      { path: '/about', label: 'about' },
      { path: '/contact', label: 'contact' },
    ]; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="text-neutral-900 dark:text-neutral-100"
        class="font-mono text-sm text-neutral-500 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
      >{{ link.label }}</a>
    }
    <button
      (click)="toggleDarkMode()"
      class="text-neutral-500 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors ml-2 p-1"
      [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      @if (isDark()) {
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
      }
    </button>
  </div>
</nav>
